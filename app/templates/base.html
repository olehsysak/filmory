<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Filmory{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <!-- Base -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">

    <!-- Components -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/components/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components/hero.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

<header class="navbar">
    <div class="navbar__container">

        <a href="/" class="navbar__logo">Filmory</a>

        <nav class="navbar__nav">
            <a href="/films" class="nav-link">Films</a>

            <div class="nav-dropdown">
                <button class="nav-link nav-link--arrow">Lists ▾</button>
                <div class="nav-dropdown__menu">
                    <a href="/favorites" class="nav-dropdown__item">Favorites</a>
                    <a href="/lists" class="nav-dropdown__item">My Lists</a>
                </div>
            </div>

            <a href="/profile" class="nav-link">Profile</a>
        </nav>

        <div class="navbar__actions">
            <form class="search-form" id="searchForm">
                <input
                    type="text"
                    class="search-form__input"
                    id="searchInput"
                    placeholder="Search films..."
                    autocomplete="off"
                >
                <button type="submit" class="search-form__btn">⌕</button>
            </form>

            <div class="auth" id="authBlock">
                <a href="/login" class="btn btn--outline">Login</a>
                <a href="/register" class="btn btn--primary">Register</a>
            </div>

            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <span class="theme-toggle__icon">☀</span>
            </button>
        </div>

    </div>
</header>

<main class="main">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="footer__container">
        <p class="footer__text">Filmory © 2026 · Powered by <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    </div>
</footer>

<script src="{{ url_for('static', path='js/theme.js') }}"></script>
<script src="{{ url_for('static', path='js/index.js') }}"></script>
<script src="{{ url_for('static', path='js/auth.js') }}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
